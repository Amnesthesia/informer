name: Weekly RSS Feed

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Date window"
        required: false
        default: "weekly"
        type: choice
        options: [weekly, daily]
      provider:
        description: "AI provider"
        required: false
        default: "claude"
        type: choice
        options: [claude, gemini]
      include_articles:
        description: "Include individual article entries below category digests"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  generate-feed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python 3.10 ships sgmllib in stdlib, which feedparser 6.x requires.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check OPML file exists
        run: |
          if [ ! -f feeds.opml ]; then
            echo "::error::feeds.opml not found. Commit your OPML subscription list to the repo root."
            exit 1
          fi

      - name: Resolve run parameters
        run: |
          echo "MODE=${{ inputs.mode || 'weekly' }}" >> "$GITHUB_ENV"
          echo "AI_PROVIDER=${{ inputs.provider || vars.AI_PROVIDER || 'gemini' }}" >> "$GITHUB_ENV"

      - name: Generate RSS feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          ARTICLE_FLAG=""
          if [ "${{ inputs.include_articles }}" = "true" ]; then ARTICLE_FLAG="--include-articles"; fi
          python rss_categorizer.py feeds.opml \
            --provider "$AI_PROVIDER" \
            --mode "$MODE" \
            --rss-out rss.xml \
            $ARTICLE_FLAG

      - name: Commit and push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # feed.rss matches *.rss in .gitignore; -f bypasses that for this tracked output file
          git add -f feed.rss
          if git diff --staged --quiet; then
            echo "Feed unchanged — nothing to commit."
          else
            git commit -m "chore: update RSS feed ($(date -u +'%Y-%m-%d'))"
            git push
          fi
